<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Settings</title>

<style>
body {
    font-family: Arial;
    background: #0b1220;
    color: white;
    margin: 0;
}

header {
    background: #111827;
    padding: 15px;
    text-align: center;
}

.container {
    max-width: 600px;
    margin: auto;
    padding: 20px;
}

.card {
    background: #111827;
    padding: 15px;
    margin-bottom: 15px;
    border-radius: 10px;
}

input {
    width: 100%;
    padding: 10px;
    margin: 5px 0;
    border-radius: 6px;
    border: none;
}

button {
    padding: 10px;
    background: #2563eb;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

button:hover {
    background: #1d4ed8;
}
</style>
</head>

<body>

<header>
    <h1>⚙️ Settings</h1>
</header>

<div class="container">

    <!-- PROFILE -->
    <div class="card">
        <h2>Profile</h2>
        <p id="usernameDisplay">Loading...</p>
        <button onclick="loadProfile()">Refresh Profile</button>
    </div>

    <!-- CHANGE PASSWORD -->
    <div class="card">
        <h2>Change Password</h2>
        <input id="newPassword" type="password" placeholder="New Password">
        <button onclick="changePassword()">Update Password</button>
    </div>

    <!-- LOGOUT -->
    <div class="card">
        <h2>Account</h2>
        <button onclick="logout()">Logout</button>
    </div>

</div>

<script>
const API = "https://bookish-pancake-g4wj6j9j6q64hgx-5000.app.github.dev/api";
let token = localStorage.getItem("token");


// ======================
// LOAD PROFILE
// ======================
async function loadProfile() {
    if (!token) {
        document.getElementById("usernameDisplay").innerText = "Not logged in";
        return;
    }

    try {
        const res = await fetch(`${API}/users/me`, {
            headers: {
                "Authorization": `Bearer ${token}`
            }
        });

        const user = await res.json();

        if (!res.ok) {
            document.getElementById("usernameDisplay").innerText =
                "Failed to load profile";
            return;
        }

        document.getElementById("usernameDisplay").innerText =
            "Username: " + user.username;

    } catch (err) {
        console.error("Profile error:", err);
        document.getElementById("usernameDisplay").innerText =
            "Error loading profile";
    }
}


// ======================
// CHANGE PASSWORD
// ======================
async function changePassword() {
    const newPassword = document.getElementById("newPassword").value;

    if (!newPassword) {
        alert("Enter a new password");
        return;
    }

    try {
        const res = await fetch(`${API}/users/change-password`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": `Bearer ${token}`
            },
            body: JSON.stringify({ password: newPassword })
        });

        const data = await res.json();

        if (!res.ok) {
            alert("Failed to update password");
            return;
        }

        alert("Password updated successfully!");

    } catch (err) {
        console.error("Password error:", err);
        alert("Error updating password");
    }
}


// ======================
// LOGOUT
// ======================
function logout() {
    localStorage.removeItem("token");
    alert("Logged out");
    window.location.href = "/";
}


// ======================
// INIT
// ======================
window.onload = () => {
    loadProfile();
};
</script>

</body>
</html>
